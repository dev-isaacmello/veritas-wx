# Parâmetros de ingestão e matching — o hash deste arquivo compõe ingest_version.
# Mudou parâmetro => nova ingest_version => reprocessamento auditável, nunca overwrite.

window:
  start: "2025-07-01"   # AIFS operacional desde 2025-02-25 — janela coberta
  end: "2026-06-30"     # inclusivo; sujeito a confirmação da auditoria (docs/data_audit.md)

runs_utc: [0, 12]       # denominador comum dos 4 sistemas

leads_hours:
  start: 6
  stop: 240
  step: 6

precip_leads_hours:     # janela [lead-24, lead]
  start: 24
  stop: 240
  step: 6

variables: [t2m, wind10m, precip_24h]

models:
  gfs:
    source: "s3://noaa-gfs-bdp-pds"
    format: grib2_idx          # subsetting por byte-range via .idx
  hres:
    source: "s3://ecmwf-forecasts"
    product: "ifs/0p25/oper"
    format: grib2_index        # subsetting por byte-range via .index
  aifs:
    source: "s3://ecmwf-forecasts"
    product: "aifs-single/0p25/oper"
    format: grib2_index
  graphcast:
    source: "s3://noaa-oar-mlwp-data"
    product: "GRAP_v100_GFS"   # confirmado na auditoria (T2)
    format: netcdf_hdf5
    file_size_gb: 5.8          # POR RUN — leitura seletiva por range é obrigatória
    known_missing_runs: 50     # 6.8%, 2026-04..06; ausência vira ausência de par (ADR-0002)

observations:
  inmet:
    # ADR-0002: bulk anual é a fonte PRIMÁRIA (apitempo horário degradado: 2xx vazio)
    bulk: "https://portal.inmet.gov.br/uploads/dadoshistoricos/{year}.zip"
    metadata_api: "https://apitempo.inmet.gov.br"   # /estacoes/T ainda funciona
    fallback: bdmep
    precip_priority: true
  isd:
    # ADR-0002: NO-GO Fase 1 — arquivo NCEI congelado (última obs BR 2025-08-24)
    status: excluded_phase1
    inventory: "https://www.ncei.noaa.gov/pub/data/noaa/isd-history.csv"

static:
  dem: "s3://copernicus-dem-30m"           # GLO-30, leitura COG por janela
  koppen: "https://figshare.com/ndownloader/files/61012822"  # Beck 2023 1km, CC-BY-4.0
  oni: "https://www.cpc.ncep.noaa.gov/data/indices/oni.ascii.txt"
  # ADR-0002: BoM congelado 2024-02; espelho IRI da MESMA série RMM é o primário
  mjo_rmm: "https://iridl.ldeo.columbia.edu/SOURCES/.BoM/.MJO/.RMM/"
  mjo_rmm_format_reference: "http://www.bom.gov.au/climate/mjo/graphics/rmm.74toRealtime.txt"

match:
  max_delta_z_m: 500           # pares além disso: descartados e CONTADOS (nunca silencioso)
  interp:
    t2m: bilinear
    wind10m: bilinear          # magnitude computada nos nós ANTES de interpolar
    precip_24h: nearest        # preserva extremos
  precip_completeness_min_hours: 22   # de 24; senão o par não é emitido (contado)

storage:
  data_root: "data"            # symlink -> HD 1TB (veritas-wx-data/)
  mount:
    device: "/dev/sda3"
    expected_path: "/media/uiliam-isaac-da-silva-mello/F4D45654D4561966"
    # a partição NÃO monta sozinha no boot: todo script de build roda
    # ensure_mounted() (udisksctl, sem sudo) antes de tocar no data_root
  prune_raw: true              # raw local podável após extração; manifests (sha256)
                               # + buckets públicos garantem auditabilidade
